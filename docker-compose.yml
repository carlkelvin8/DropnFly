services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: carlkelvinmanahan
      POSTGRES_DB: luggage_storage
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://carlkelvinmanahan@postgres:5432/luggage_storage?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-this-in-production
    depends_on:
      - postgres

volumes:
  pgdata:
